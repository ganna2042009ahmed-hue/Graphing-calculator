<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Graph Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>


<div id="container">
    <canvas id="graphCalculator"></canvas>
    
    <div id="ui">
        <h2>Graph Simulation</h2>
        
        <div class="input-group">
            <label for="funcInput">Enter Equation</label>
            <div class="input-wrapper">
                <span class="prefix">y = </span>
                <input type="text" id="funcInput" value="sin(x) * x" placeholder="e.g. x^2">
            </div>
        </div>

        <div class="help">
            <div class="help-section">
                <strong>Supported Functions</strong>
                <p>sin, cos, tan, sqrt, abs, log, x^2...</p>
            </div>
            <div class="help-section">
                <strong>Navigation</strong>
                <ul>
                    <li>Drag to Pan</li>
                    <li>Scroll to Zoom (Coming soon)</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
